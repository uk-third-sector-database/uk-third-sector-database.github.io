<!-- GoatCounter: cookieless analytics, no consent banner required.

<script data-goatcounter="https://{{ site.analytics.goatcounter.code }}.goatcounter.com/count"
        src="https://gc.zgo.at/count.v5.js"
        integrity="sha384-atnOLvQb9t+jTSipvd75X2yginT4PjVbqDdlJAmxMm+wYElFmeR6EmLP5bYeoRVQ"
        crossorigin="anonymous"
        async></script>
{% endif %}
